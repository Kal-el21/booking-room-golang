services:
  # PostgreSQL Database
  postgres:
    image: postgres:18.1
    container_name: room-booking-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: room_booking_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - room-booking-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (Golang)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: room-booking-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Application
      APP_NAME: "Room Booking System"
      APP_ENV: production
      APP_PORT: 8080
      APP_URL: http://localhost:8080
      
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: room_booking_db
      DB_SSLMODE: disable
      DB_TIMEZONE: Asia/Jakarta
      
      # JWT
      JWT_SECRET: b6d528f756efc75c1283220118299dff1af19f663fabebe1d4aaa1a39d9581d6da3007bdc0e879a25938637b3fede05e191dd2c0e3c7adf7446c188e259526a6
      JWT_ACCESS_TOKEN_EXPIRE_HOURS: 24
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: 7
      JWT_REMEMBER_ME_ACCESS_DAYS: 7
      JWT_REMEMBER_ME_REFRESH_DAYS: 30
      
      # CORS
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:80,http://localhost
      CORS_ALLOWED_METHODS: GET,POST,PUT,DELETE,PATCH,OPTIONS
      CORS_ALLOWED_HEADERS: Content-Type,Authorization,Accept,Origin
      
      # Email (optional)
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
      SMTP_FROM_NAME: "Room Booking System"
      SMTP_FROM_EMAIL: "noreply@roombooking.com"
      
      # Features
      ENABLE_EMAIL_VERIFICATION: "false"
      ENABLE_EMAIL_NOTIFICATIONS: "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - room-booking-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: room-booking-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - room-booking-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

# Volumes
volumes:
  postgres_data:
    driver: local

# Networks
networks:
  room-booking-network:
    driver: bridge